name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  unit:
    name: Unit (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx tsc -p tsconfig.json --noEmit
      - run: npm run lint
      - run: npx jest --coverage

  integration:
    name: Integration (Postgres + Mongo replica set)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: indigodb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Change streams + transactions need a replica set; service containers
      # can't pass command args, so Mongo is started manually.
      - name: Start MongoDB single-node replica set
        run: |
          docker run -d --name mongo -p 27017:27017 mongo:7 --replSet rs0
          for i in $(seq 1 30); do
            if docker exec mongo mongosh --quiet --eval "db.runCommand({ ping: 1 })" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          docker exec mongo mongosh --quiet --eval 'rs.initiate({_id:"rs0",members:[{_id:0,host:"localhost:27017"}]})'
          for i in $(seq 1 30); do
            if docker exec mongo mongosh --quiet --eval "db.hello().isWritablePrimary" | grep -q true; then
              echo "Replica set primary is ready"
              break
            fi
            sleep 1
          done

      - run: npm ci
      - run: npm run build

      - name: Run integration suite
        run: npm run test:integration
        env:
          PG_HOST: localhost
          PG_PORT: 5432
          PG_USER: postgres
          PG_PASSWORD: postgres
          PG_DATABASE: indigodb_test
          MONGO_URL: mongodb://localhost:27017/indigodb_test?directConnection=true

  docs:
    name: API docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run docs
      - uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: docs/
